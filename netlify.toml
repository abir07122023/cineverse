# Redirect all traffic from Netlify to Vercel
[[redirects]]
  from = "/*"
  to = "https://cineverse-free.vercel.app/:splat"
  status = 301
  force = true

# Also disable caching on Netlify (optional)
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
